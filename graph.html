<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'SF Mono', 'Fira Code', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #58a6ff;
    letter-spacing: 0.5px;
  }

  .stats {
    font-size: 12px;
    color: #8b949e;
    margin-left: auto;
    display: flex;
    gap: 16px;
  }

  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  .controls {
    padding: 8px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  input[type="text"] {
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: #58a6ff; }
  input[type="text"]::placeholder { color: #484f58; }

  button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover { background: #30363d; border-color: #58a6ff; color: #58a6ff; }
  button.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }

  .mode-group {
    display: flex;
    gap: 4px;
    margin-left: 10px;
    padding-left: 10px;
    border-left: 1px solid #30363d;
  }

  .mode-btn {
    padding: 4px 10px;
    font-size: 11px;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph { width: 100%; height: 100%; }

  #tooltip {
    position: absolute;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    max-width: 350px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  #tooltip .tip-name {
    color: #58a6ff;
    font-weight: 600;
    margin-bottom: 4px;
    word-break: break-all;
  }

  #tooltip .tip-type {
    font-size: 10px;
    color: #d29922;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #tooltip .tip-info { color: #8b949e; font-size: 11px; }

  #info-panel {
    position: absolute;
    right: 16px;
    top: 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px;
    width: 280px;
    display: none;
    font-size: 12px;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-height: 80vh;
    overflow-y: auto;
  }

  #info-panel h3 {
    color: #58a6ff;
    font-size: 13px;
    margin-bottom: 8px;
    word-break: break-all;
  }

  #info-panel .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    color: #8b949e;
  }

  #info-panel .info-row span:last-child { color: #e6edf3; }

  #info-panel h4 {
    color: #3fb950;
    font-size: 11px;
    margin: 10px 0 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #info-panel .dep-item {
    color: #8b949e;
    font-size: 11px;
    padding: 2px 0;
    border-bottom: 1px solid #21262d;
    word-break: break-all;
  }

  #info-panel .dep-file {
    color: #58a6ff;
  }

  .legend {
    position: absolute;
    left: 16px;
    bottom: 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    color: #8b949e;
    z-index: 50;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .legend-item:last-child { margin-bottom: 0; }

  .legend-color {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-shape {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>

<header>
  <h1>⬡ Codebase Graph</h1>
  <div class="stats" id="stats"></div>
</header>

  <input type="text" id="search" placeholder="Tìm file/function...">
  <button onclick="resetView()">↺ Reset view</button>
  <button id="btn-physics" class="active" onclick="togglePhysics()">⚡ Physics</button>
  <button onclick="focusHighDegree()">★ Hub nodes</button>
  <button onclick="exportPNG()">↓ PNG</button>
  
  <div class="mode-group">
    <button id="mode-file" class="mode-btn active" onclick="setMode('file')">Files</button>
    <button id="mode-func" class="mode-btn" onclick="setMode('func')">Functions</button>
    <button id="mode-hybrid" class="mode-btn" onclick="setMode('hybrid')">Hybrid</button>
  </div>
</div>

<div id="graph-container">
  <div id="graph"></div>
  <div id="tooltip"></div>
  <div id="info-panel"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-shape" style="background:#58a6ff"></div> File</div>
    <div class="legend-item"><div class="legend-shape" style="background:#3fb950"></div> Function</div>
    <div class="legend-item"><div class="legend-shape" style="background:#d29922"></div> Hook/Component</div>
    <div class="legend-item"><div class="legend-color" style="background:#f85149"></div> Import</div>

const PROJECT_NAME = "Yonsei-Pulse";
// ═══════════════════════════════════════════════

let currentMode = 'file';
let network = null;

function getNodesForMode(mode) {
  if (mode === 'file') return FILE_NODES;
  if (mode === 'func') return FUNC_NODES;
  return [...FILE_NODES, ...FUNC_NODES];
}

function getEdgesForMode(mode) {
  if (mode === 'file') return FILE_EDGES;
  if (mode === 'func') return FUNC_EDGES;
  return [...FILE_EDGES, ...FUNC_EDGES];
}

function buildDegreeMap(nodes, edges) {
  const degreeMap = {};
  nodes.forEach(n => { degreeMap[n.id] = 0; });
  edges.forEach(e => {
    degreeMap[e.from] = (degreeMap[e.from] || 0) + 1;
    degreeMap[e.to]   = (degreeMap[e.to]   || 0) + 1;
  });
  return degreeMap;
}

const allNodes = getNodesForMode('hybrid');
const allEdges = getEdgesForMode('hybrid');
const degreeMap = buildDegreeMap(allNodes, allEdges);
const maxDeg = Math.max(...Object.values(degreeMap), 1);

function nodeColor(id, label, type) {
  const deg = degreeMap[id] || 0;
  const ratio = deg / maxDeg;
  
  if (id.includes(':')) {
    const nodeType = type || 'function';
    if (nodeType === 'hook') return { bg: '#1a3a2a', border: '#3fb950', font: '#3fb950' };
    if (nodeType === 'component') return { bg: '#3a2e0a', border: '#d29922', font: '#d29922' };
    return { bg: '#2d1f3d', border: '#a371f7', font: '#a371f7' };
  }
  
  if (ratio > 0.6) return { bg: '#1f6feb', border: '#58a6ff', font: '#e6edf3' };
  if (label.match(/component|screen|page|view/i)) return { bg: '#1a3a2a', border: '#3fb950', font: '#3fb950' };
  if (label.match(/util|helper|lib|hook|service|api/i)) return { bg: '#3a2e0a', border: '#d29922', font: '#d29922' };
  return { bg: '#1c2128', border: '#484f58', font: '#8b949e' };
}

function nodeSize(id) {
  const deg = degreeMap[id] || 0;
  return 12 + (deg / maxDeg) * 22;
}

function nodeShape(id) {
  if (id.includes(':')) return 'box';
  return 'dot';
}

function shortLabel(path) {
  if (path.includes(':')) {
    const [file, func] = path.split(':');
    const fileParts = file.split('/');
    const shortFile = fileParts[fileParts.length - 1];
    return `${shortFile}:${func}`;
  }
  const parts = path.split('/');
  const file = parts[parts.length - 1];
  return file.replace(/\.(js|ts|jsx|tsx|py|go|rs|java|c|cpp|cs|rb|swift|kt|vue|svelte)$/, '');
}

function buildGraph(mode) {
  const nodes = getNodesForMode(mode);
  const edges = getEdgesForMode(mode);
  
  const degreeMap = buildDegreeMap(nodes, edges);
  const maxDeg = Math.max(...Object.values(degreeMap), 1);

  const nodeTypeMap = {};
  FUNC_NODES.forEach(n => { nodeTypeMap[n.id] = n.type; });

  const visNodes = new vis.DataSet(nodes.map(n => {
    const label = shortLabel(n.label);
    const nodeType = n.type || (n.id.includes(':') ? 'function' : 'file');
    const col = nodeColor(n.id, label, nodeType);
    const shape = nodeShape(n.id);
    const isFunc = n.id.includes(':');
    return {
      id: n.id,
      label,
      title: n.label,
      size: nodeSize(n.id),
      shape: shape,
      color: { 
        background: col.bg, 
        border: col.border, 
        highlight: { background: isFunc ? '#a371f7' : '#1f6feb', border: '#58a6ff' } 
      },
      font: { color: col.font, size: shape === 'box' ? 9 : 11, face: 'SF Mono, Fira Code, monospace' },
      borderWidth: 1.5,
      _fullPath: n.label,
      _degree: degreeMap[n.id] || 0,
      _isFunction: isFunc,
    };
  }));

  const visEdges = new vis.DataSet(edges.map((e, i) => ({
    id: i,
    from: e.from,
    to: e.to,
    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
    color: { color: e.type === 'call' ? '#a371f7' : '#f85149', highlight: '#58a6ff', opacity: 0.7 },
    width: e.type === 'call' ? 1 : 2,
    dashes: e.type === 'call',
    smooth: { type: 'curvedCW', roundness: 0.1 },
  })));

  return { nodes: visNodes, edges: visEdges };
}

let currentData = buildGraph('file');
const options = {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -60,
      centralGravity: 0.008,
      springLength: 120,
      springConstant: 0.05,
      damping: 0.6,
    },
    stabilization: { iterations: 200 },
  },
  interaction: {
    hover: true,
    tooltipDelay: 0,
    hideEdgesOnDrag: true,
    multiselect: true,
  },
  layout: { improvedLayout: false },
};

const container = document.getElementById('graph');
network = new vis.Network(container, currentData, options);

const totalNodes = getNodesForMode(currentMode).length;
const totalEdges = getEdgesForMode(currentMode).length;
document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-dot" style="background:#58a6ff"></div>${totalNodes} nodes</div>
  <div class="stat"><div class="stat-dot" style="background:#3fb950"></div>${totalEdges} edges</div>
  <div class="stat"><div class="stat-dot" style="background:#d29922"></div>${PROJECT_NAME}</div>
`;

const tooltip = document.getElementById('tooltip');
network.on('hoverNode', params => {
  const node = currentData.nodes.get(params.node);
  if (!node) return;
  const isFunc = node._isFunction;
  tooltip.style.display = 'block';
  tooltip.innerHTML = `
    <div class="tip-type">${isFunc ? 'Function' : 'File'}</div>
    <div class="tip-name">${node._fullPath}</div>
    <div class="tip-info">Connections: ${node._degree}</div>
  `;
});

network.on('blurNode', () => { tooltip.style.display = 'none'; });

container.addEventListener('mousemove', e => {
  tooltip.style.left = (e.offsetX + 14) + 'px';
  tooltip.style.top  = (e.offsetY + 14) + 'px';
});

const infoPanel = document.getElementById('info-panel');
network.on('click', params => {
  if (params.nodes.length === 0) { infoPanel.style.display = 'none'; return; }
  const nodeId = params.nodes[0];
  const node = currentData.nodes.get(nodeId);
  if (!node) return;

  const connectedEdges = network.getConnectedEdges(nodeId);
  const incoming = [], outgoing = [];
  connectedEdges.forEach(eid => {
    const edge = currentData.edges.get(eid);
    if (!edge) return;
    if (edge.to === nodeId) {
      const src = currentData.nodes.get(edge.from);
      if (src) incoming.push({ path: src._fullPath, isFunc: src._isFunction });
    } else {
      const dst = currentData.nodes.get(edge.to);
      if (dst) outgoing.push({ path: dst._fullPath, isFunc: dst._isFunction });
    }
  });

  const makeDeps = (arr) => arr.length === 0
    ? '<div class="dep-item" style="color:#484f58">none</div>'
    : arr.map(p => `<div class="dep-item ${p.isFunc ? 'dep-func' : 'dep-file'}">${shortLabel(p.path)}</div>`).join('');

  infoPanel.style.display = 'block';
  infoPanel.innerHTML = `
    <h3>${shortLabel(node._fullPath)}</h3>
    <div class="info-row"><span>Full path</span><span>${node._fullPath}</span></div>
    <div class="info-row"><span>Type</span><span>${node._isFunction ? 'Function' : 'File'}</span></div>
    <div class="info-row"><span>Total connections</span><span>${node._degree}</span></div>
    <div class="info-row"><span>Imports/Calls (out)</span><span>${outgoing.length}</span></div>
    <div class="info-row"><span>Imported/Called by (in)</span><span>${incoming.length}</span></div>
    <h4>→ Imports/Calls</h4>${makeDeps(outgoing)}
    <h4>← Imported/Called by</h4>${makeDeps(incoming)}
  `;
});

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { 
    currentData.nodes.forEach(n => currentData.nodes.update({ id: n.id, opacity: 1 })); 
    return; 
  }
  currentData.nodes.forEach(n => {
    const match = n._fullPath.toLowerCase().includes(q);
    currentData.nodes.update({ id: n.id, opacity: match ? 1 : 0.08 });
  });
});

let physicsOn = true;
function togglePhysics() {
  physicsOn = !physicsOn;
  network.setOptions({ physics: { enabled: physicsOn } });
  document.getElementById('btn-physics').classList.toggle('active', physicsOn);
}

function resetView() {
  network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
}

function focusHighDegree() {
  const threshold = maxDeg * 0.4;
  const hubs = allNodes.filter(n => (degreeMap[n.id] || 0) >= threshold).map(n => n.id);
  if (hubs.length === 0) return;
  network.selectNodes(hubs);
  network.fit({ nodes: hubs, animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
}

function setMode(mode) {
  currentMode = mode;
  
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');
  
  currentData = buildGraph(mode);
  network.setData(currentData);
  
  const nodes = getNodesForMode(mode);
  const edges = getEdgesForMode(mode);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#58a6ff"></div>${nodes.length} nodes</div>
    <div class="stat"><div class="stat-dot" style="background:#3fb950"></div>${edges.length} edges</div>
    <div class="stat"><div class="stat-dot" style="background:#d29922"></div>${PROJECT_NAME}</div>
  `;
}

function exportPNG() {
  const canvas = container.querySelector('canvas');
  if (!canvas) return;
  const a = document.createElement('a');
  a.download = 'codebase-graph.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

network.on('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
  physicsOn = false;
  document.getElementById('btn-physics').classList.remove('active');
});
});
